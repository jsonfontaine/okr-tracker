services:
  okr-tracker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: okr-tracker
    ports:
      - "8080:80"
    volumes:
      - ./database:/data
    environment:
      - Seq__ServerUrl=http://seq:80
    depends_on:
      - seq
    restart: unless-stopped

  seq:
    image: datalust/seq:latest
    container_name: okr-tracker-seq
    ports:
      - "5341:80"
    environment:
      - ACCEPT_EULA=Y
    volumes:
      - seq-data:/data
    restart: unless-stopped

volumes:
  seq-data:
